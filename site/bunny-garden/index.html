<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <base href="/bunny-garden/">
    <title>🐰 Bunny Garden</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="scene">
        <div id="sky-day"></div>
        <div id="sky-night"></div>
        <div id="stars"></div>
        <div id="celestial">
            <div id="sun"></div>
            <div id="moon"></div>
        </div>
        <div id="clouds">
            <div class="cloud cloud-1"></div>
            <div class="cloud cloud-2"></div>
            <div class="cloud cloud-3"></div>
        </div>
        <div id="hills">
            <div class="hill hill-back"></div>
            <div class="hill hill-mid"></div>
            <div class="hill hill-front"></div>
        </div>
        <div id="ground"></div>
        <div id="garden"></div>
        <canvas id="particle-canvas"></canvas>
        <div id="effects"></div>
    </div>

    <header id="header">
        <h1 id="title">🐰 Bunny Garden 🌸</h1>
        <p id="subtitle">Click to plant lilies · Tap bunnies to pet · Drag to move them!</p>
    </header>

    <div id="stats">
        <div class="stat">
            <span class="stat-icon">🐰</span>
            <span class="stat-value" id="bunny-count">0</span>
        </div>
        <div class="stat">
            <span class="stat-icon">🌸</span>
            <span class="stat-value" id="flower-count">0</span>
        </div>
    </div>

    <nav id="controls">
        <button class="ctrl-btn" id="btn-bunny" title="Add a bunny!">
            <span class="ctrl-icon">🐰</span>
            <span class="ctrl-label">Add Bunny</span>
        </button>
        <button class="ctrl-btn" id="btn-carrot" title="Feed the bunnies!">
            <span class="ctrl-icon">🥕</span>
            <span class="ctrl-label">Feed</span>
        </button>
        <button class="ctrl-btn" id="btn-daynight" title="Toggle day/night">
            <span class="ctrl-icon" id="daynight-icon">🌙</span>
            <span class="ctrl-label" id="daynight-label">Night</span>
        </button>
        <button class="ctrl-btn" id="btn-petals" title="Make it rain petals!">
            <span class="ctrl-icon">✨</span>
            <span class="ctrl-label">Petals</span>
        </button>
        <button class="ctrl-btn" id="btn-music" title="Toggle ambient music">
            <span class="ctrl-icon" id="music-icon">🎵</span>
            <span class="ctrl-label" id="music-label">Music</span>
        </button>
    </nav>

    <div id="fact-bar">
        <span id="fact-text">Welcome to Bunny Garden! 🌸</span>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
